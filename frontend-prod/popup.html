<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Comment Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --surface2: #1a1a1f;
      --surface3: #222228;
      --border: #2a2a32;
      --border-hover: #3a3a45;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.10);
      --accent-glow: rgba(232, 255, 71, 0.25);
      --pos: #3dffa0;
      --pos-dim: rgba(61, 255, 160, 0.10);
      --neg: #ff4d6d;
      --neg-dim: rgba(255, 77, 109, 0.10);
      --neu: #7c8cf8;
      --neu-dim: rgba(124, 140, 248, 0.10);
      --purple: #b48cff;
      --purple-dim: rgba(180, 140, 255, 0.10);
      --cyan: #47e8ff;
      --cyan-dim: rgba(71, 232, 255, 0.10);
      --orange: #ffae47;
      --orange-dim: rgba(255, 174, 71, 0.10);
      --pink: #ff6baa;
      --pink-dim: rgba(255, 107, 170, 0.10);
      --text: #f0f0f2;
      --muted: #5a5a68;
      --sub: #9090a0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 440px;
      max-height: 600px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ═══ HEADER ═══ */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo { display: flex; align-items: center; gap: 8px; }

    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800;
      color: var(--text); letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--accent); }

    .header-badge {
      font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* ═══ CONTENT ═══ */
    .content { padding: 12px; }

    /* ═══ STATUS BAR ═══ */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-dot.idle { background: var(--muted); animation: none; }
    .status-dot.done { background: var(--pos); animation: none; }
    .status-dot.err { background: var(--neg); animation: none; }

    .status-text { font-size: 11px; color: var(--sub); flex: 1; }
    .status-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }

    /* ═══ VERDICT CARD ═══ */
    .verdict-card {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid transparent;
    }
    .verdict-card.positive { background: var(--pos-dim); border-color: rgba(61,255,160,0.2); }
    .verdict-card.negative { background: var(--neg-dim); border-color: rgba(255,77,109,0.2); }
    .verdict-card.neutral  { background: var(--neu-dim); border-color: rgba(124,140,248,0.2); }

    .verdict-left { display: flex; align-items: center; gap: 10px; }
    .verdict-emoji { font-size: 24px; }
    .verdict-label { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 1px; }
    .verdict-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
    .verdict-card.positive .verdict-title { color: var(--pos); }
    .verdict-card.negative .verdict-title { color: var(--neg); }
    .verdict-card.neutral .verdict-title { color: var(--neu); }

    .verdict-score { text-align: right; }
    .verdict-score-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; line-height: 1; }
    .verdict-card.positive .verdict-score-val { color: var(--pos); }
    .verdict-card.negative .verdict-score-val { color: var(--neg); }
    .verdict-card.neutral .verdict-score-val { color: var(--neu); }
    .verdict-score-label { font-size: 9px; color: var(--muted); margin-top: 2px; }

    /* ═══ STATS GRID ═══ */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }

    .stat-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
    .stat-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ═══ SENTIMENT BAR ═══ */
    .sentiment-bar-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 8px;
    }

    .bar-track {
      height: 8px; border-radius: 4px;
      background: var(--surface2);
      display: flex; overflow: hidden; margin-bottom: 8px;
    }

    .bar-seg { height: 100%; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .bar-seg.pos { background: var(--pos); }
    .bar-seg.neu { background: var(--neu); }
    .bar-seg.neg { background: var(--neg); }

    .bar-legend { display: flex; justify-content: space-between; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.pos { background: var(--pos); }
    .legend-dot.neu { background: var(--neu); }
    .legend-dot.neg { background: var(--neg); }
    .legend-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--sub); }
    .legend-pct { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
    .legend-pct.pos { color: var(--pos); }
    .legend-pct.neu { color: var(--neu); }
    .legend-pct.neg { color: var(--neg); }

    /* ═══ CHARTS ═══ */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px; margin-bottom: 10px;
    }
    .chart-wrap { background: var(--surface2); border-radius: 6px; padding: 6px; margin-top: 6px; }
    .chart-wrap img { width: 100%; border-radius: 4px; display: block; }

    /* ═══ TABS ═══ */
    .tabs-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden; margin-bottom: 10px;
    }
    .tabs-header { display: flex; border-bottom: 1px solid var(--border); }

    .tab-btn {
      flex: 1; padding: 8px 4px;
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 500; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active.pos { color: var(--pos); border-bottom-color: var(--pos); }
    .tab-btn.active.neu { color: var(--neu); border-bottom-color: var(--neu); }
    .tab-btn.active.neg { color: var(--neg); border-bottom-color: var(--neg); }

    .tab-count { background: var(--surface2); padding: 1px 4px; border-radius: 3px; font-size: 8px; }
    .tab-btn.active.pos .tab-count { background: var(--pos-dim); color: var(--pos); }
    .tab-btn.active.neu .tab-count { background: var(--neu-dim); color: var(--neu); }
    .tab-btn.active.neg .tab-count { background: var(--neg-dim); color: var(--neg); }

    .tab-pane { display: none; padding: 10px; }
    .tab-pane.active { display: block; }

    /* ═══ COMMENT ITEMS ═══ */
    .comment-list { list-style: none; max-height: 250px; overflow-y: auto; }
    .comment-list::-webkit-scrollbar { width: 3px; }
    .comment-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .comment-item {
      padding: 8px 10px; border-radius: 6px;
      margin-bottom: 6px; border-left: 3px solid transparent;
      background: var(--surface2); transition: transform 0.15s;
    }
    .comment-item:hover { transform: translateX(3px); }
    .comment-item.pos { border-left-color: var(--pos); }
    .comment-item.neu { border-left-color: var(--neu); }
    .comment-item.neg { border-left-color: var(--neg); }

    .comment-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .comment-num { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); }
    .comment-tag { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 5px; border-radius: 3px; }
    .comment-tag.pos { background: var(--pos-dim); color: var(--pos); }
    .comment-tag.neu { background: var(--neu-dim); color: var(--neu); }
    .comment-tag.neg { background: var(--neg-dim); color: var(--neg); }
    .comment-text { font-size: 11px; color: var(--sub); line-height: 1.4; }

    .empty-tab { text-align: center; padding: 20px; color: var(--muted); font-size: 11px; }

    /* ═══ LOADING ═══ */
    .loading-state { text-align: center; padding: 36px 16px; }
    .loader { width: 32px; height: 32px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: var(--muted); }

    /* ═══ IDLE / ERROR ═══ */
    .idle-state { text-align: center; padding: 36px 16px; }
    .idle-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.3; }
    .idle-text { font-size: 12px; color: var(--muted); }
    .error-box { background: var(--neg-dim); border: 1px solid rgba(255,77,109,0.3); border-radius: 8px; padding: 12px; color: #ff7a8e; font-size: 11px; text-align: center; }

    /* ══════════════════════════════════════════════════════════════════════════
       CREATOR ANALYTICS SECTION
       ══════════════════════════════════════════════════════════════════════════ */

    .creator-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0 10px; padding: 0 2px;
    }
    .creator-divider::before,
    .creator-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .creator-divider-text {
      font-family: 'Syne', sans-serif;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--accent); white-space: nowrap;
    }

    /* Feature Card Grid */
    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .feature-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .feature-card:hover::before { opacity: 1; }

    /* Color variants */
    .feature-card.green::before { background: linear-gradient(90deg, var(--pos), transparent); }
    .feature-card.orange::before { background: linear-gradient(90deg, var(--orange), transparent); }
    .feature-card.purple::before { background: linear-gradient(90deg, var(--purple), transparent); }
    .feature-card.pink::before { background: linear-gradient(90deg, var(--pink), transparent); }
    .feature-card.cyan::before { background: linear-gradient(90deg, var(--cyan), transparent); }
    .feature-card.blue::before { background: linear-gradient(90deg, var(--neu), transparent); }
    .feature-card.red::before { background: linear-gradient(90deg, var(--neg), transparent); }
    .feature-card.accent::before { background: linear-gradient(90deg, var(--accent), transparent); }

    .feature-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 6px;
    }

    .feature-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    .feature-icon.green { background: var(--pos-dim); }
    .feature-icon.orange { background: var(--orange-dim); }
    .feature-icon.purple { background: var(--purple-dim); }
    .feature-icon.pink { background: var(--pink-dim); }
    .feature-icon.cyan { background: var(--cyan-dim); }
    .feature-icon.blue { background: var(--neu-dim); }
    .feature-icon.red { background: var(--neg-dim); }
    .feature-icon.accent { background: var(--accent-dim); }

    .feature-badge {
      font-family: 'DM Mono', monospace;
      font-size: 7px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .badge-unique { background: rgba(71, 232, 255, 0.12); color: var(--cyan); }
    .badge-new { background: rgba(180, 140, 255, 0.12); color: var(--purple); }
    .badge-ai { background: rgba(232, 255, 71, 0.12); color: var(--accent); }
    .badge-core { background: rgba(61, 255, 160, 0.12); color: var(--pos); }

    .feature-num {
      font-family: 'DM Mono', monospace;
      font-size: 8px; color: var(--muted);
      margin-bottom: 2px;
    }

    .feature-title {
      font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .feature-desc {
      font-size: 10px;
      color: var(--sub);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    /* Feature preview boxes */
    .feature-preview {
      background: var(--surface2);
      border-radius: 6px;
      padding: 8px;
      font-size: 10px;
      color: var(--sub);
      line-height: 1.5;
    }

    .feature-preview .fp-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .feature-preview .fp-value {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text);
    }

    .fp-tag {
      display: inline-block;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      margin: 2px 2px 0 0;
      font-family: 'DM Mono', monospace;
    }

    .fp-tag.green { background: var(--pos-dim); color: var(--pos); }
    .fp-tag.orange { background: var(--orange-dim); color: var(--orange); }
    .fp-tag.purple { background: var(--purple-dim); color: var(--purple); }
    .fp-tag.pink { background: var(--pink-dim); color: var(--pink); }

    /* Controversy bar */
    .controversy-bar {
      height: 6px; border-radius: 3px;
      margin: 6px 0 4px;
      display: flex; overflow: hidden;
      background: var(--surface3);
    }
    .controversy-seg { height: 100%; transition: width 0.6s ease; }
    .controversy-seg.pos { background: var(--pos); }
    .controversy-seg.neg { background: var(--neg); }
    .controversy-seg.neu { background: var(--neu); }

    /* Health meter */
    .health-meter {
      width: 100%; height: 6px;
      border-radius: 3px;
      background: var(--surface3);
      margin: 6px 0 4px;
      overflow: hidden;
    }
    .health-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    /* Fan list */
    .fan-item {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0;
      font-size: 10px;
    }
    .fan-name { color: var(--pos); font-weight: 600; }
    .fan-stats { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 9px; }

    /* Idea list */
    .idea-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--surface3);
    }
    .idea-item:last-child { border-bottom: none; }
    .idea-title { font-size: 10px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .idea-reason { font-size: 9px; color: var(--muted); line-height: 1.3; }

    /* Reply drafts */
    .reply-item { padding: 6px 0; border-bottom: 1px solid var(--surface3); }
    .reply-item:last-child { border-bottom: none; }
    .reply-comment { font-size: 9px; color: var(--neg); margin-bottom: 2px; }
    .reply-draft { font-size: 10px; color: var(--pos); font-style: italic; }

    /* Hype moment */
    .hype-item {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0; font-size: 10px;
    }
    .hype-ts {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--cyan);
      background: var(--cyan-dim);
      padding: 1px 5px; border-radius: 3px;
    }
    .hype-info { color: var(--sub); font-size: 9px; }

    /* Cluster item */
    .cluster-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 10px;
    }
    .cluster-name { color: var(--text); }
    .cluster-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--neg);
      background: var(--neg-dim);
      padding: 1px 5px; border-radius: 3px;
    }

    /* Expandable detail panel */
    .feature-detail {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      animation: slideDown 0.3s ease;
    }

    .feature-detail.active { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .detail-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700;
    }
    .detail-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 22px; height: 22px;
      border-radius: 5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }
    .detail-close:hover { color: var(--text); border-color: var(--border-hover); }

    .detail-body { font-size: 11px; color: var(--sub); line-height: 1.5; }

    /* Loading shimmer for feature cards */
    .feature-loading {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 10px;
      margin: 3px 0;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Gemini badge inline */
    .gemini-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 7px; color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 5px; border-radius: 3px;
      margin-left: 4px;
    }
    .gemini-badge::before { content: '✦'; font-size: 7px; }

    /* Question item */
    .question-item {
      font-size: 10px; color: var(--sub);
      padding: 4px 0;
      border-bottom: 1px solid var(--surface3);
      line-height: 1.4;
    }
    .question-item:last-child { border-bottom: none; }
    .question-item::before {
      content: '"';
      color: var(--cyan);
      font-size: 14px;
      margin-right: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-mark">📊</div>
      <div class="logo-text">Comment<span>Lens</span></div>
    </div>
    <div class="header-badge">YT ANALYZER</div>
  </div>

  <div class="content">
    <div id="output"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
